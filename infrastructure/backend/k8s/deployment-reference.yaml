# Reference only — adjust namespace, image, and resources for your cluster.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: governance-runner
  labels:
    app: governance-runner
spec:
  replicas: 1
  selector:
    matchLabels:
      app: governance-runner
  template:
    metadata:
      labels:
        app: governance-runner
        component: execution
    spec:
      containers:
        - name: runner
          image: governance-runner:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              name: http
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 15
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: governance-runner
spec:
  selector:
    app: governance-runner
  ports:
    - port: 8080
      targetPort: 8080
      name: http
